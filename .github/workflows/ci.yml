name: Continuous Integration test
on:
  pull_request:
    branches: [ main ]  # Runs when a PR targets main
  push:
    branches: [ main ] # Runs when you push directly to main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check
      - name: Validate Terraform
      - run: terraform validate
      - run: terraform init -backend=false # initializes providers without connecting to a remote backend (faster, safer in CI).
      - run: terraform plan -no-color input=false
